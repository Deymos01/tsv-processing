app:
  env: development  # development | production

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  db_name: "tsv_processor"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

worker:
  pool_size: 4           # number of concurrent workers
  queue_size: 100        # buffered job channel capacity
  scan_interval: 10s     # how often to scan input directory

files:
  input_dir: "./data/input"
  output_dir: "./data/output"